<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://admin.tago.io/dist/custom-widget.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #fff; color: #1a1a1a; padding: 16px; }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  td { border: 1px solid #fff; }
  .row-label { font-size: 12px; font-weight: 500; color: #1a1a1a; padding: 4px 8px; white-space: nowrap; width: 110px; }
  .hour-label { font-size: 10px; color: #888; text-align: center; padding: 2px 0; font-weight: 500; }
  .cell { width: 22px; height: 28px; text-align: center; font-size: 9px; font-weight: 600; cursor: default; border-radius: 2px; }
  .no-data { background: #f5f5f5; color: #ccc; }
  .zero   { background: #f5f5f5; color: #bbb; }
  .band1  { background: #14B8A6; color: #fff; }
  .band2  { background: #6DCE70; color: #fff; }
  .band3  { background: #A8D83A; color: #fff; }
  .band4  { background: #EAB308; color: #fff; }
  .band5  { background: #F97316; color: #fff; }
  .band6  { background: #EF4444; color: #fff; }
  .band7  { background: #DC2626; color: #fff; }
  .current-time { outline: 2px solid #378ADD; outline-offset: -1px; border-radius: 2px; }
  #last-updated { font-size: 11px; color: #aaa; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div style="font-size:14px; font-weight:500; color:#1a1a1a;">Meeting Room Utilisation</div>
    <div style="font-size:12px; color:#888; margin-top:2px;" id="date-label"></div>
  </div>
</div>

<div style="overflow-x: auto; margin-top:8px;">
  <table>
    <thead id="grid-head"></thead>
    <tbody id="grid-body"></tbody>
  </table>
</div>

<!-- Legend below heatmap -->
<div style="margin-top:14px; display:flex; flex-direction:column; gap:3px;">
  <div style="display:flex; position:relative; height:14px; width:154px;">
    <span style="font-size:10px; color:#555; position:absolute; left:22px;">15%</span>
    <span style="font-size:10px; color:#555; position:absolute; left:88px;">50%</span>
    <span style="font-size:10px; color:#555; position:absolute; left:132px;">100%</span>
  </div>
  <div style="display:flex; gap:2px;">
    <div style="width:20px; height:20px; border-radius:3px; background:#14B8A6;"></div>
    <div style="width:20px; height:20px; border-radius:3px; background:#6DCE70;"></div>
    <div style="width:20px; height:20px; border-radius:3px; background:#A8D83A;"></div>
    <div style="width:20px; height:20px; border-radius:3px; background:#EAB308;"></div>
    <div style="width:20px; height:20px; border-radius:3px; background:#F97316;"></div>
    <div style="width:20px; height:20px; border-radius:3px; background:#EF4444;"></div>
    <div style="width:20px; height:20px; border-radius:3px; background:#DC2626;"></div>
  </div>
  <div style="display:flex; position:relative; height:14px; width:154px;">
    <span style="font-size:10px; color:#555; position:absolute; left:0px;">Low</span>
    <span style="font-size:10px; color:#555; position:absolute; left:55px;">Ideal</span>
    <span style="font-size:10px; color:#555; position:absolute; left:120px;">High</span>
  </div>
</div>

<div id="last-updated"></div>

<script>
  const ROOM_NAME    = "Meeting Room 1";
  const START_HOUR   = 8;
  const END_HOUR     = 18;
  const SLOT_MINS    = 15;
  const DEVICE_TOKEN = "5e199bc2-3543-4da1-97f5-1dcad9f117d4";
  const DEVICE_ID    = "6a06e2fcbc24cc000c1119fb";
  const REFRESH_MS   = 5 * 60 * 1000;

  const slots = [];
  for (let h = START_HOUR; h < END_HOUR; h++) {
    for (let m = 0; m < 60; m += SLOT_MINS) {
      slots.push({ h, m });
    }
  }

  document.getElementById('date-label').textContent =
    new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  function buildHeader() {
    const head = document.getElementById('grid-head');
    let html = '<tr><td class="row-label" style="font-size:11px; color:#aaa;">Room</td>';
    slots.forEach(s => {
      const isHour = s.m === 0;
      html += `<td class="hour-label" style="font-weight:${isHour ? '600' : '400'}; color:${isHour ? '#555' : '#ccc'};">
        ${isHour ? String(s.h).padStart(2,'0') : ''}
      </td>`;
    });
    html += '</tr>';
    head.innerHTML = html;
  }

  function getCellClass(pct) {
    if (pct === null) return 'no-data';
    if (pct === 0)    return 'zero';
    if (pct <= 15)    return 'band1';
    if (pct <= 25)    return 'band2';
    if (pct <= 50)    return 'band3';
    if (pct <= 65)    return 'band4';
    if (pct <= 75)    return 'band5';
    if (pct <= 90)    return 'band6';
    return 'band7';
  }

  function getCellText(pct) {
    if (pct === null || pct === 0) return '';
    return pct + '%';
  }

  function isCurrentSlot(h, m) {
    const now = new Date();
    const slotM = Math.floor(now.getMinutes() / SLOT_MINS) * SLOT_MINS;
    return now.getHours() === h && slotM === m;
  }

  function buildRow(dataMap) {
    const body = document.getElementById('grid-body');
    let html = `<tr><td class="row-label">${ROOM_NAME}</td>`;
    slots.forEach(s => {
      const key = `${s.h}:${String(s.m).padStart(2, '0')}`;
      const pct = dataMap.hasOwnProperty(key) ? dataMap[key] : null;
      const cls = getCellClass(pct);
      const txt = getCellText(pct);
      const isCurrent = isCurrentSlot(s.h, s.m);
      const tooltip = `${String(s.h).padStart(2,'0')}:${String(s.m).padStart(2,'00')} — ${pct !== null ? pct + '%' : 'no data'}`;
      html += `<td class="cell ${cls}${isCurrent ? ' current-time' : ''}" title="${tooltip}">${txt}</td>`;
    });
    html += '</tr>';
    body.innerHTML = html;
  }

  function processData(data) {
    const dataMap = {};
    if (!data || !data.length) return dataMap;
    data.forEach(item => {
      if (item.variable !== 'utilisation_pct') return;
      const d = new Date(item.time);
      const h = d.getHours();
      const slotM = Math.floor(d.getMinutes() / SLOT_MINS) * SLOT_MINS;
      if (h >= START_HOUR && h < END_HOUR) {
        const key = `${h}:${String(slotM).padStart(2, '0')}`;
        dataMap[key] = Math.round(item.value);
      }
    });
    return dataMap;
  }

  async function loadFromAPI() {
    try {
      const url = `https://api.eu-w1.tago.io/data?variable=utilisation_pct&qty=200&ordination=asc&device=${DEVICE_ID}`;
      const res = await fetch(url, {
        headers: { 'Device-Token': DEVICE_TOKEN, 'Content-Type': 'application/json' }
      });
      const json = await res.json();
      console.log('API response:', json);
      const dataMap = processData(json.result || []);
      buildRow(dataMap);
      document.getElementById('last-updated').textContent =
        'Last updated: ' + new Date().toLocaleTimeString('en-GB');
    } catch(e) {
      console.error('API error:', e);
    }
  }

  // Initialise grid
  buildHeader();
  buildRow({});

  // Wait 1.5 seconds after page load to check if TagoIO SDK has fully initialised.
  // The SDK script loads in both contexts but window.TagoIO.onRealtime is only
  // available when running inside the TagoIO dashboard iframe.
setTimeout(function() {
    if (window.TagoIO && typeof window.TagoIO.onRealtime === 'function') {
      console.log('Running inside TagoIO dashboard — using SDK');

      // Call getData directly rather than waiting for onStart
      window.TagoIO.getData().then(function(data) {
        console.log('getData response:', JSON.stringify(data));
        const dataMap = processData(data);
        buildRow(dataMap);
        document.getElementById('last-updated').textContent =
          'Last updated: ' + new Date().toLocaleTimeString('en-GB');
      }).catch(function(err) {
        console.error('getData error:', err);
        loadFromAPI();
      });

      window.TagoIO.onRealtime(function(data) {
        console.log('onRealtime data received:', JSON.stringify(data));
        const dataMap = processData(data);
        buildRow(dataMap);
        document.getElementById('last-updated').textContent =
          'Last updated: ' + new Date().toLocaleTimeString('en-GB');
      });

      window.TagoIO.ready();

    } else {
      console.log('TagoIO SDK not active — using direct API');
      loadFromAPI();
      setInterval(loadFromAPI, REFRESH_MS);
    }
  }, 1500);
</script>
</body>
</html>
